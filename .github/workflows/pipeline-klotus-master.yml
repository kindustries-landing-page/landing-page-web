name: Pipeline Web — klotus master

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kindustries-landing-page/landing-page-web-klotus-master
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=http://${{ vars.HEAD_HOST }}:10022
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Head
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass
      - name: Guard deploy secrets
        run: |
          test -n "${{ secrets.GHCR_PAT }}" || (echo "GHCR_PAT missing" && exit 1)
          test -n "${{ secrets.HEAD_PASSWORD }}" || (echo "HEAD_PASSWORD missing" && exit 1)
      - name: Run deploy script
        env:
          SSHPASS: ${{ secrets.HEAD_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ vars.HEAD_PORT }} \
            ${{ vars.HEAD_USER }}@${{ vars.HEAD_HOST }} \
            "echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin ; \
             docker pull ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.sha }} || true ; \
             docker rm -f landing-page-web-klotus-master || true ; \
             docker ps -q --filter publish=8022 | xargs -r docker rm -f || true ; \
             docker run -d --name landing-page-web-klotus-master --restart always -p 8022:3000 ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.sha }}"
      - name: Health check
        env:
          SSHPASS: ${{ secrets.HEAD_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ vars.HEAD_PORT }} \
            ${{ vars.HEAD_USER }}@${{ vars.HEAD_HOST }} \
            '
              for i in $(seq 1 20); do
                code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8022/ || true)
                if [ "$code" = "200" ]; then
                  echo "✅ Web health OK"
                  docker image prune -af
                  exit 0
                fi
                echo "Attempt $i: got $code, retrying..."
                sleep 3
              done
              echo "❌ Health check failed"
              docker logs --tail=100 landing-page-web-klotus-master || true
              exit 1
            '
