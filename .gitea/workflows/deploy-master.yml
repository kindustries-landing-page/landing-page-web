name: Deploy Klotus Landing Page Web Production
on:
  push:
    branches: [ master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write deploy script
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          cat > /tmp/deploy-web.sh << SCRIPT
          #!/bin/bash
          set -e
          export GIT_TOKEN="${GIT_TOKEN}"
          cd /opt/repos/klotus/landing-page-web
          git remote set-url origin https://lio.nguyen:\${GIT_TOKEN}@git.liouni.com/klotus/landing-page-web.git
          git fetch origin
          git checkout master
          git reset --hard origin/master
          cd /opt/stacks/klotus-landing-page-web
          docker compose up -d --build --force-recreate
          for i in \$(seq 1 30); do
            code=\$(docker exec klotus-landing-page-web sh -lc "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1; echo \$?" || true)
            if [ "\$code" = "0" ]; then
              echo "Web health OK"
              exit 0
            fi
            sleep 2
          done
          echo "Web health check failed"
          exit 1
          SCRIPT
          chmod +x /tmp/deploy-web.sh

      - name: Deploy Web on Head
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no /tmp/deploy-web.sh lio@100.75.67.115:/tmp/deploy-web.sh
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no lio@100.75.67.115 'bash /tmp/deploy-web.sh'
