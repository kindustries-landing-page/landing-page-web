name: Deploy Klotus Landing Page Web Production
on:
  push:
    branches: [master]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          if echo "${{ secrets.DEPLOY_KEY }}" | base64 -d >/tmp/deploy_key 2>/dev/null; then
            mv /tmp/deploy_key ~/.ssh/id_ed25519
          else
            printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
      - name: Deploy Web on Head
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no lio@100.119.247.85 '
            set -e
            cd /opt/repos/klotus/landing-page-web
            git fetch origin
            git checkout master
            git reset --hard origin/master
            cd /opt/stacks/klotus-landing-page-web
            docker compose up -d --force-recreate
            sleep 5
            for i in $(seq 1 20); do
              if docker exec klotus-landing-page-web sh -lc "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"; then
                echo "Web health OK"
                exit 0
              fi
              sleep 3
            done
            echo "Web health check failed"
            docker logs --tail=100 klotus-landing-page-web || true
            exit 1
          '
